services:
  # The Node.js API Service
  - type: web
    name: event-backend
    env: node
    # Since the project is in a subdirectory, we set the root directory
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: event-db
          property: connectionString
      - key: FRONTEND_URL
        value: "https://your-frontend-url-on-vercel.vercel.app" # You will update this later in the Render Dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: STRIPE_SECRET_KEY
        value: "sk_test_..." # Add this in Render Dashboard later

  # The PostgreSQL Database
  - type: pgo
    name: event-db
    plan: free
